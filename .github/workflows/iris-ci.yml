name: IRIS-CardioFlow CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          files=(
            "src/Installer.cls"
            "src/CardioFlow/Production.cls"
            "src/CardioFlow/BP/CardioOrchestrator.bpl"
            "src/CardioFlow/DTL/HL7ToSDA3.dtl"
            "src/CardioFlow/DTL/FHIRToSDA3.dtl"
            "docker/Dockerfile"
            "docker/docker-compose.yml"
            ".iris-agentic-dev.toml"
          )
          for file in "${files[@]}"; do
            test -f "$file" || (echo "Missing $file" && exit 1)
          done

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build builder stage
        run: docker build --target builder -f docker/Dockerfile -t cardioflow-iris:test .

      - name: Build runtime image
        run: docker build --target runtime -f docker/Dockerfile -t cardioflow-iris:latest .
