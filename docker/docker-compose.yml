services:
  iris:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cardioflow-iris
    hostname: cardioflow-iris
    ports:
      - "52773:52773"
      - "1972:1972"
    volumes:
      - ../src:/home/irisowner/src:ro
      - ../dashboard:/home/irisowner/dashboard:ro
    healthcheck:
      test: ["CMD-SHELL", "iris qlist IRIS | grep -q running"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: unless-stopped


